<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real Estate Landing Page</title>
    <!-- ! reset css -->
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <!-- todo style css -->
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <!-- todo responsive css -->
    <link rel="stylesheet" href="./assets/css/responsive.css" />
    <!--  ! font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- ! header -->
    <header id="header" class="header">
      <div class="container">
        <nav class="navbar">
          <!-- ! tablet & mobile toggle menu button -->
          <label for="checkbox-menu" class="toggle-menu">
            <svg xmlns="http://www.w3.org/2000/svg" height="16" width="14" viewBox="0 0 448 512">
              <path
                d="M0 96C0 78.3 14.3 64 32 64H416c17.7 0 32 14.3 32 32s-14.3 32-32 32H32C14.3 128 0 113.7 0 96zM0 256c0-17.7 14.3-32 32-32H416c17.7 0 32 14.3 32 32s-14.3 32-32 32H32c-17.7 0-32-14.3-32-32zM448 416c0 17.7-14.3 32-32 32H32c-17.7 0-32-14.3-32-32s14.3-32 32-32H416c17.7 0 32 14.3 32 32z"
                fill="currentColor"
              />
            </svg>
          </label>
          <a href="#hero" class="nav-logo">
            <img src="./assets/img/logo.svg" alt="Besnik." />
          </a>
          <!-- ! pc menu -->
          <ul class="nav-menu">
            <li>
              <a href="#hero">Home</a>
            </li>
            <li>
              <a href="">Features</a>
            </li>
            <li>
              <a href="">Services</a>
            </li>
            <li>
              <a href="">Resources</a>
            </li>
            <li>
              <a href="">Contact</a>
            </li>
          </ul>
          <div class="nav-cta">
            <a href="#!" class="nav-link">Sign in</a>
            <a href="#!" class="nav-btn btn">Sign up</a>
          </div>
        </nav>
      </div>
    </header>
    <!-- ! responsive menu -->
    <div class="responsive-menu">
      <input type="checkbox" name="" class="checkbox-menu" id="checkbox-menu" hidden />
      <!-- ! menu overlay -->
      <label for="checkbox-menu" class="overlay"></label>
      <!-- ! menu drawer -->
      <div class="menu-drawer">
        <a href="#hero" class="menu-drawer-logo">
          <img src="./assets/img/logo.svg" alt="Besnik." />
        </a>
        <!-- ! pc menu -->
        <ul class="nav-menu">
          <li>
            <a href="#hero">Home</a>
          </li>
          <li>
            <a href="">Features</a>
          </li>
          <li>
            <a href="">Services</a>
          </li>
          <li>
            <a href="">Resources</a>
          </li>
          <li>
            <a href="">Contact</a>
          </li>
          <li class="hidden-tablet seperate">
            <a href="#!" class="nav-cta">Sign in</a>
          </li>
          <li class="hidden-tablet">
            <a href="#!" class="nav-cta">Sign up</a>
          </li>
        </ul>
      </div>
    </div>
    <main></main>
  </body>
</html>
